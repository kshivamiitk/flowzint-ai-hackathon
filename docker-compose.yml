services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pulseresolve
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulseresolve"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      APP_ENV: development
      DEMO_MODE: ${DEMO_MODE:-true}
      DATABASE_URL: postgresql+asyncpg://pulse:pulse@db:5432/pulseresolve
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      AI_PROVIDER: ${AI_PROVIDER:-local}
      CHATBOT_API_BASE_URL: ${CHATBOT_API_BASE_URL:-https://api.openai.com/v1}
      CHATBOT_API_KEY: ${CHATBOT_API_KEY:-}
      CHATBOT_MODEL: ${CHATBOT_MODEL:-gpt-4.1-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
